<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- BufferLine brand mark — dark background variant -->
  <!-- Copied from brand-system/assets/logo/mark-dark.svg -->
  <!-- Outer ring: observation boundary -->
  <circle cx="32" cy="32" r="28" stroke="url(#mark-gradient)" stroke-width="2.5" fill="none"/>
  <!-- Flow lines: judgment flow -->
  <path d="M14 32h8m8 0h8m8 0h8" stroke="url(#mark-gradient)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot: observation point -->
  <circle cx="32" cy="32" r="5" fill="url(#mark-gradient)"/>
  <defs>
    <linearGradient id="mark-gradient" x1="0" y1="0" x2="64" y2="64">
      <stop stop-color="#818CF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
</svg>
